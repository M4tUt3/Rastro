<style>
  :root{
    --negro:#070a07;
    --negro2:#0e130d;
    --hueso:#d8d0bf;
    --hueso-tenue:#8a8676;
    --sangre:#b5161a;
    --ambar:#e0a324;
    --slate:#2a322a;
    --linea:#1c241c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--negro);color:var(--hueso);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    overscroll-behavior:none;user-select:none;-webkit-user-select:none;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;}

  #app{display:flex;flex-direction:column;height:100dvh;}

  /* Encabezado */
  header{display:flex;align-items:center;justify-content:space-between;
    padding:9px 14px;border-bottom:1px solid var(--linea);background:var(--negro2);}
  .marca{display:flex;align-items:baseline;gap:9px;}
  .marca b{font-size:18px;letter-spacing:.32em;font-weight:800;}
  .marca span{font-size:9.5px;letter-spacing:.22em;color:var(--hueso-tenue);text-transform:uppercase;}
  .estado{font-size:10px;letter-spacing:.14em;color:var(--hueso-tenue);text-transform:uppercase;}

  /* Visor */
  #visor{position:relative;flex:1;min-height:0;background:#000;overflow:hidden;
    display:flex;align-items:center;justify-content:center;}

  /* Pantalla completa: header y panel flotan sobre el visor para que la cámara use toda la pantalla */
  #app.fs header,#app.fs #panel{position:absolute;left:0;right:0;z-index:5;
    background:rgba(7,10,7,.55);backdrop-filter:blur(3px);}
  #app.fs header{top:0;border-bottom:none;}
  #app.fs #panel{bottom:0;border-top:none;padding-bottom:max(16px,env(safe-area-inset-bottom));}
  #lienzo{width:100%;height:100%;object-fit:cover;image-rendering:auto;display:block;}
  video{display:none;}

  /* Reticula */
  #reticula{position:absolute;inset:0;pointer-events:none;}
  #reticula::before,#reticula::after{content:"";position:absolute;background:rgba(216,208,191,.28);}
  #reticula::before{left:50%;top:calc(50% - 17px);width:1px;height:34px;transform:translateX(-.5px);}
  #reticula::after{top:50%;left:calc(50% - 17px);height:1px;width:34px;transform:translateY(-.5px);}
  .zona{position:absolute;left:50%;top:50%;width:38%;height:38%;transform:translate(-50%,-50%);
    border:1px solid rgba(224,163,36,.30);border-radius:3px;}
  .zona.activa{border-color:var(--sangre);box-shadow:0 0 0 1px var(--sangre),0 0 22px rgba(181,22,26,.55) inset;}

  /* HUD lectura */
  #hud{position:absolute;left:12px;top:12px;display:flex;flex-direction:column;gap:6px;}
  .lectura{background:rgba(7,10,7,.62);backdrop-filter:blur(2px);border:1px solid var(--linea);
    border-radius:4px;padding:6px 9px;min-width:96px;}
  .lectura .k{font-size:8.5px;letter-spacing:.18em;color:var(--hueso-tenue);text-transform:uppercase;}
  .lectura .v{font-size:21px;line-height:1.05;font-weight:700;}
  .lectura .v small{font-size:11px;color:var(--hueso-tenue);font-weight:500;}
  .alerta{position:absolute;top:12px;right:12px;font-size:11px;letter-spacing:.16em;font-weight:800;
    text-transform:uppercase;padding:7px 12px;border-radius:4px;border:1px solid var(--linea);
    background:rgba(7,10,7,.62);color:var(--hueso-tenue);transition:all .12s;}
  .alerta.on{background:var(--sangre);color:#fff;border-color:var(--sangre);box-shadow:0 0 18px rgba(181,22,26,.6);}

  /* Pantalla de inicio */
  #inicio{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 0%,#11170f 0%,#070a07 70%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:30px;text-align:center;}
  #inicio h1{font-size:26px;letter-spacing:.3em;margin:0;font-weight:800;}
  #inicio p{margin:0;max-width:330px;font-size:13px;line-height:1.55;color:var(--hueso-tenue);}
  .arrancar{font-family:inherit;font-size:15px;letter-spacing:.14em;font-weight:700;text-transform:uppercase;
    color:#fff;background:var(--sangre);border:none;border-radius:6px;padding:16px 34px;
    box-shadow:0 6px 24px rgba(181,22,26,.4);cursor:pointer;}
  .arrancar:active{transform:translateY(1px);}
  #aviso{font-size:11.5px;color:var(--ambar);max-width:320px;line-height:1.5;min-height:16px;}

  /* Controles */
  #panel{background:var(--negro2);border-top:1px solid var(--linea);padding:11px 14px 16px;
    display:flex;flex-direction:column;gap:13px;}
  .fila{display:flex;gap:8px;}
  .seg{flex:1;display:flex;background:var(--negro);border:1px solid var(--linea);border-radius:6px;overflow:hidden;}
  .seg button{flex:1;font-family:inherit;font-size:12px;letter-spacing:.06em;font-weight:600;
    color:var(--hueso-tenue);background:transparent;border:none;padding:10px 4px;cursor:pointer;}
  .seg button.sel{background:var(--slate);color:var(--hueso);}
  .seg.color button.sel{color:#fff;}
  .seg.color button[data-c="rojo"].sel{background:#7a1012;}
  .seg.color button[data-c="amarillo"].sel{background:#6b5800;}
  .seg.color button[data-c="verde"].sel{background:#15521a;}
  .seg.color button[data-c="cian"].sel{background:#0a4d57;}

  .slider-wrap{display:flex;flex-direction:column;gap:6px;}
  .slider-top{display:flex;justify-content:space-between;align-items:center;}
  .slider-top label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--hueso-tenue);}
  .slider-top output{font-size:13px;font-weight:700;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:30px;background:transparent;margin:0;}
  input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;
    background:linear-gradient(90deg,var(--slate),var(--ambar));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;
    border-radius:50%;background:var(--hueso);border:3px solid var(--negro2);margin-top:-9.5px;box-shadow:0 1px 4px #000;}

  .acciones{display:flex;gap:8px;}
  .acciones button{flex:1;font-family:inherit;font-size:11px;letter-spacing:.08em;font-weight:700;text-transform:uppercase;
    color:var(--hueso);background:var(--negro);border:1px solid var(--linea);border-radius:6px;padding:13px 4px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;}
  .acciones button .ic{font-size:16px;line-height:1;}
  .acciones button.activo{border-color:var(--ambar);color:var(--ambar);}
  .acciones button:disabled{opacity:.32;}
  .acciones button:active{transform:translateY(1px);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="marca"><b>RASTRO</b><span>de Matute</span></div>
    <div class="estado mono" id="estado">en espera</div>
  </header>

  <div id="visor">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="lienzo"></canvas>
    <div id="reticula"><div class="zona" id="zona"></div></div>
    <div id="hud">
      <div class="lectura"><div class="k">Detección</div><div class="v mono"><span id="pct">0</span><small>%</small></div></div>
    </div>
    <div class="alerta mono" id="alerta">— sin rastro</div>

    <div id="inicio">
      <h1>RASTRO</h1>
      <p>Apuntá la cámara al terreno. La app apaga los verdes y marrones del fondo y hace brillar la sangre. Funciona sin internet.</p>
      <button class="arrancar" id="btnArrancar">Activar cámara</button>
      <div id="aviso"></div>
      <div style="font-size:10px;letter-spacing:.28em;color:var(--hueso-tenue);text-transform:uppercase;margin-top:4px;">Equipo de Matute · Caza</div>
    </div>
  </div>

  <div id="panel">
    <div class="fila">
      <div class="seg" id="modo">
        <button data-m="fresca" class="sel">Sangre fresca</button>
        <button data-m="seca">Sangre seca</button>
      </div>
    </div>
    <div class="fila">
      <div class="seg color" id="color">
        <button data-c="rojo" class="sel">Rojo</button>
        <button data-c="amarillo">Amarillo</button>
        <button data-c="verde">Verde</button>
        <button data-c="cian">Cian</button>
      </div>
    </div>
    <div class="slider-wrap">
      <div class="slider-top"><label>Sensibilidad</label><output class="mono" id="sensVal">60</output></div>
      <input type="range" id="sens" min="0" max="100" value="60">
    </div>
    <div class="acciones">
      <button id="btnLinterna" disabled><span class="ic">▲</span>Linterna</button>
      <button id="btnCongelar"><span class="ic">❚❚</span>Congelar</button>
      <button id="btnPantalla"><span class="ic">⤢</span>Pantalla</button>
    </div>
  </div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const video = $("#video"), lienzo = $("#lienzo"), ctx = lienzo.getContext("2d", {willReadFrequently:true});
const inicio = $("#inicio"), aviso = $("#aviso"), estado = $("#estado");
const pctEl = $("#pct"), alertaEl = $("#alerta"), zonaEl = $("#zona");
let stream=null, track=null, corriendo=false, congelado=false, wakeLock=null;
let ancho=0, alto=0;
let modo="fresca", colorSel="rojo", sens=0.60;

const COLORES = {
  rojo:[255,40,40], amarillo:[255,224,0], verde:[60,255,40], cian:[0,235,255]
};

/* ---- Controles ---- */
$("#modo").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  modo=b.dataset.m;[...e.currentTarget.children].forEach(x=>x.classList.toggle("sel",x===b));});
$("#color").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  colorSel=b.dataset.c;[...e.currentTarget.children].forEach(x=>x.classList.toggle("sel",x===b));});
$("#sens").addEventListener("input",e=>{sens=e.target.value/100;$("#sensVal").textContent=e.target.value;});

$("#btnArrancar").addEventListener("click",iniciar);
$("#btnCongelar").addEventListener("click",e=>{
  congelado=!congelado;e.currentTarget.classList.toggle("activo",congelado);
  e.currentTarget.querySelector(".ic").textContent=congelado?"▶":"❚❚";
  estado.textContent=congelado?"congelado":"rastreando";
  if(!congelado)bucle();
});
$("#btnLinterna").addEventListener("click",async e=>{
  if(!track)return;const on=!e.currentTarget.classList.contains("activo");
  try{await track.applyConstraints({advanced:[{torch:on}]});}catch(_){}
  if(!on){
    // En varios Android/Chrome, torch:false no apaga el LED si no se reinicia la cámara
    try{
      stream.getTracks().forEach(t=>t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}}, audio:false
      });
      video.srcObject=stream;
      track=stream.getVideoTracks()[0];
      await video.play();
      const caps=track.getCapabilities?track.getCapabilities():{};
      $("#btnLinterna").disabled=!caps.torch;
    }catch(_){}
  }
  e.currentTarget.classList.toggle("activo",on);
});
$("#btnPantalla").addEventListener("click",()=>{
  const el=document.documentElement;
  if(!document.fullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen||(()=>{})).call(el);}
  else{(document.exitFullscreen||document.webkitExitFullscreen||(()=>{})).call(document);}
});
document.addEventListener("fullscreenchange",()=>{
  $("#app").classList.toggle("fs",!!document.fullscreenElement);
});
document.addEventListener("webkitfullscreenchange",()=>{
  $("#app").classList.toggle("fs",!!document.webkitFullscreenElement);
});

/* ---- Cámara ---- */
async function iniciar(){
  aviso.textContent="";
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}}, audio:false
    });
  }catch(err){
    aviso.textContent="No se pudo abrir la cámara. Dale permiso a Chrome y reintentá. (Necesita abrirse desde el archivo en el navegador, no dentro de otra app.)";
    return;
  }
  video.srcObject=stream;
  track=stream.getVideoTracks()[0];
  await video.play();

  // resolución de proceso (cap para que rinda en gama media)
  const vw=video.videoWidth||1280, vh=video.videoHeight||720;
  const maxW=480;
  ancho=Math.min(vw,maxW); alto=Math.round(ancho*vh/vw);
  lienzo.width=ancho; lienzo.height=alto;

  // linterna si el equipo la soporta
  try{const caps=track.getCapabilities?track.getCapabilities():{};
    if(caps.torch)$("#btnLinterna").disabled=false;}catch(_){}

  // mantener pantalla encendida
  try{if("wakeLock" in navigator)wakeLock=await navigator.wakeLock.request("screen");}catch(_){}

  inicio.style.display="none";
  estado.textContent="rastreando";
  corriendo=true; congelado=false;
  bucle();
}

/* ---- Umbrales según modo + sensibilidad ---- */
function umbrales(){
  if(modo==="fresca"){
    return {hLow:8+12*sens, hHigh:352-12*sens, sMin:0.55-0.38*sens, vMin:0.12, vMax:0.98};
  }else{ // seca / oscura
    return {hLow:24+20*sens, hHigh:344-16*sens, sMin:0.34-0.26*sens, vMin:0.05, vMax:0.93};
  }
}

let alertaActiva=false, ultimoBuzz=0;

function bucle(){
  if(!corriendo||congelado)return;
  ctx.drawImage(video,0,0,ancho,alto);
  let img;
  try{img=ctx.getImageData(0,0,ancho,alto);}catch(_){requestAnimationFrame(bucle);return;}
  const d=img.data;
  const t=umbrales();
  const [hr,hg,hb]=COLORES[colorSel];

  // zona central para la alerta
  const zx0=ancho*0.31|0, zx1=ancho*0.69|0, zy0=alto*0.31|0, zy1=alto*0.69|0;
  let zonaTot=0, zonaSangre=0;

  for(let y=0;y<alto;y++){
    const enFilaZona = (y>=zy0&&y<zy1);
    for(let x=0;x<ancho;x++){
      const i=(y*ancho+x)*4;
      const r=d[i],g=d[i+1],b=d[i+2];
      const enZona = enFilaZona && x>=zx0 && x<zx1;
      if(enZona)zonaTot++;

      // rojo debe dominar
      let esSangre=false;
      if(r>=g && r>=b){
        const max=r>g?(r>b?r:b):(g>b?g:b);
        const min=r<g?(r<b?r:b):(g<b?g:b);
        const v=max/255;
        const s=max===0?0:(max-min)/max;
        if(s>=t.sMin && v>=t.vMin && v<=t.vMax){
          // hue
          const delta=max-min;
          let h=0;
          if(delta!==0){
            if(max===r)h=60*(((g-b)/delta)%6);
            else if(max===g)h=60*(((b-r)/delta)+2);
            else h=60*(((r-g)/delta)+4);
            if(h<0)h+=360;
          }
          if(h<=t.hLow || h>=t.hHigh)esSangre=true;
        }
      }

      if(esSangre){
        // brillo según intensidad original para dar textura
        const k=0.7+0.3*(r/255);
        d[i]=Math.min(255,hr*k); d[i+1]=Math.min(255,hg*k); d[i+2]=Math.min(255,hb*k);
        if(enZona)zonaSangre++;
      }else{
        // fondo: gris-azulado oscuro
        const lum=(r*0.299+g*0.587+b*0.114);
        d[i]=lum*0.22; d[i+1]=lum*0.34; d[i+2]=lum*0.60;
      }
    }
  }
  ctx.putImageData(img,0,0);

  const pct = zonaTot? (zonaSangre/zonaTot*100):0;
  pctEl.textContent = pct<1 ? pct.toFixed(1) : Math.round(pct);

  const hay = pct>=1.2;
  if(hay!==alertaActiva){
    alertaActiva=hay;
    alertaEl.classList.toggle("on",hay);
    alertaEl.textContent = hay?"● rastro detectado":"— sin rastro";
    zonaEl.classList.toggle("activa",hay);
    if(hay && navigator.vibrate){const ahora=Date.now();if(ahora-ultimoBuzz>900){navigator.vibrate(140);ultimoBuzz=ahora;}}
  }

  requestAnimationFrame(bucle);
}

// reactivar wakeLock al volver a la pestaña
document.addEventListener("visibilitychange",async()=>{
  if(document.visibilityState==="visible" && corriendo && "wakeLock" in navigator){
    try{wakeLock=await navigator.wakeLock.request("screen");}catch(_){}
  }
});
</script>
</body>
</html>
